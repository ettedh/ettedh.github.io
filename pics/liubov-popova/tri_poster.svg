<svg
  width="20in"
  height="28in"
  viewBox="-1 -2 10 14"
  xmlns="http://www.w3.org/2000/svg"
  date="2026-02-11">
  <style>
    .f {
      font-family: "Montserrat";
      font-weight: bold;
      font-size: 1.5px;
      text-anchor: middle;
    }
  </style>
  <defs>
    <pattern id="patt" x="0" y="0" width="6" height="4" patternUnits="userSpaceOnUse">
      <polygon points="0,0 3,0 3,1 2,2" fill="green" />
      <polygon points="0,2 3,2 3,3 2,4" fill="green" />
      <polygon points="3,2 6,2 6,1 5,0" fill="green" />
      <polygon points="3,4 6,4 6,3 5,2" fill="green" />

      <rect    width="1" height="1" x="0" y="1" fill="black" />
      <polygon points="2,2 3,1 4,1 3,2"         fill="black" />
      <polygon points="4,0 5,0 4,1"             fill="black" />
      <rect    width="1" height="1" x="3" y="2" fill="black" />
      <polygon points="0,2 2,4 1,4 1,3 0,3"     fill="black" />
      <polygon points="5,2 6,2 6,3"             fill="black" />
    </pattern>
  </defs>

  <rect fill="white"      x="-1" y="-2" width="10" height="14" />
  <rect fill="url(#patt)" width="8" height="10" />
  <text class="f" x="4.00" y="-0.5">ПОПОВА</text>
  <text class="f" x="4" y="11.5">1924</text>

  
</svg>
